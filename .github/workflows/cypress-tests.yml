name:  Cypress E2E Tests - Blog do Agi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      spec:
        description: "Spec file to run (leave blank for all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  cypress-tests:
    name:  Run E2E Tests & Publish Allure Report
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4

      - name:  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name:  Install dependencies
        run: npm ci

      - name:  Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: ${{ github.event.inputs.spec || 'cypress/e2e/**/*.cy.js' }}
          config: video=true,screenshotOnRunFailure=true
        continue-on-error: true
        env:
          CYPRESS_BASE_URL: https://blogdoagi.com.br
          CYPRESS_allure: true
          CYPRESS_allureResultsPath: allure-results

      - name:  Instalar Allure CLI
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.25.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name:  Gerar relatório Allure
        run: allure generate allure-results --clean -o allure-report

      - name:  Upload Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos/
          retention-days: 7
          if-no-files-found: ignore

      - name:  Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name:  Publicar relatório no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report