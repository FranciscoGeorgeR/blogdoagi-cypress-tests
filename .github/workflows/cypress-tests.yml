name:  Cypress E2E Tests - Blog do Agi

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      spec:
        description: "Spec file to run (leave blank for all)"
        required: false
        default: ""
      browser:
        description: "Browser"
        required: false
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
          - electron

jobs:
  # ─── Job: Cypress Tests ────────────────────────────────────────────────────
  cypress-tests:
    name:  E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress Tests (${{ matrix.browser }})
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          spec: ${{ github.event.inputs.spec || 'cypress/e2e/**/*.cy.js' }}
          config: video=true,screenshotOnRunFailure=true
        env:
          CYPRESS_BASE_URL: https://blogdoagi.com.br
          CYPRESS_allure: true
          CYPRESS_allureResultsPath: allure-results

      - name: Generate Allure Report
        if: always()
        run: |
          npm run allure:generate
        continue-on-error: true

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}
          path: allure-report/
          retention-days: 30

      - name: Upload Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: cypress/videos/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/screenshots/
          retention-days: 7
          if-no-files-found: ignore

  # ─── Job: Allure GitHub Pages ──────────────────────────────────────────────
  publish-allure:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: cypress-tests
    if: always() && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure Results (chrome)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chrome
          path: allure-results/
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install allure-commandline
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
